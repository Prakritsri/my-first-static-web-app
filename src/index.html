<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSRA Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    .container {
      max-width: 400px;
      margin: 80px auto;
      text-align: center;
    }

    .portal-title {
      font-size: 20px;
      margin-bottom: 25px;
      font-weight: bold;
    }

    .form-box {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0px 2px 12px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .sign-btn {
      width: 100%;
      padding: 12px;
      background-color: #0b4c6a;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .sign-btn:hover {
      background-color: #083a52;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }
  </style>

  <!-- ✅ MSAL LIBRARY (REQUIRED) -->
  <script src="https://alcdn.msauth.net/browser/2.25.0/js/msal-browser.min.js"></script>
</head>

<body>

  <div class="container">
    <div class="portal-title">FSRA Portal</div>

    <div class="form-box">
      <!-- Cosmetic inputs only -->
      <input type="email" placeholder="Email" autocomplete="off" />
      <input type="password" placeholder="Password" autocomplete="off" />

      <button class="sign-btn" id="signinBtn">Sign In</button>
    </div>
  </div>

  <!-- ✅ YOUR PORTAL SCRIPT -->
  <script src="src/portal.js"></script>

  <div class="footer">
    © 2026 Your Organization. All Rights Reserved.
  </div>

</body>
</html>
